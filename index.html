<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NewNet — macOS Download Manager</title>
    <meta name="description" content="A beautiful native menu-bar frontend for yt-dlp. Download videos and audio from YouTube, TikTok, and more right from your Mac's menu bar." />
    <link rel="icon" type="image/png" href="app_icon.png" />

    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet" />
    
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg: #0A0A0B;
        --text: #FAFAFA;
        --text-muted: #6B6B70;
        --cyan: #00F0FF;
        --blue: #00A8FF;
        --magenta: #FF0080;
      }

      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .hero {
        text-align: center;
        max-width: 520px;
      }

      .app-icon {
        width: 120px;
        height: 120px;
        border-radius: 28px;
        margin-bottom: 32px;
        box-shadow: 0 20px 60px rgba(0, 240, 255, 0.2);
      }

      .logo {
        font-family: 'Outfit', sans-serif;
        font-size: 42px;
        font-weight: 700;
        margin-bottom: 8px;
        background: linear-gradient(135deg, var(--cyan), var(--blue), var(--magenta));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .tagline {
        font-size: 18px;
        color: var(--text-muted);
        margin-bottom: 40px;
        line-height: 1.6;
      }

      .description {
        font-size: 15px;
        color: var(--text-muted);
        line-height: 1.7;
        margin-bottom: 32px;
      }

      .description strong {
        color: var(--text);
      }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 14px 28px;
        background: linear-gradient(135deg, var(--cyan), var(--blue));
        color: var(--bg);
        border-radius: 12px;
        font-size: 15px;
        font-weight: 600;
        text-decoration: none;
        transition: transform 0.2s, box-shadow 0.2s;
      }

      .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 30px rgba(0, 240, 255, 0.3);
      }

      .btn svg {
        width: 18px;
        height: 18px;
      }

      .features {
        display: flex;
        justify-content: center;
        gap: 32px;
        margin-top: 48px;
        flex-wrap: wrap;
      }

      .feature {
        font-size: 13px;
        color: var(--text-muted);
      }

      .footer {
        margin-top: 60px;
        font-size: 13px;
        color: var(--text-muted);
      }

      .footer a {
        color: var(--text-muted);
        text-decoration: none;
      }

      .footer a:hover {
        color: var(--cyan);
      }
    </style>
  </head>
  <body>
    <div class="hero">
      <img src="app_icon.png" alt="NewNet" class="app-icon" />
      
      <h1 class="logo" style="background: linear-gradient(135deg, #00F0FF); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">NewNet</h1>
      <p class="tagline">Native macOS menu-bar app for yt-dlp</p>
      
      <p class="description">
        Download videos and audio from <strong>YouTube, TikTok, Instagram, Twitter</strong> and 1700+ sites.<br />
        Runs in your menu bar — simple, fast, and private.
      </p>
      
      <a href="https://github.com/sfdcnaveen/NewNet/releases" class="btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
        Download for macOS
      </a>

      <div class="features">
        <span class="feature">⚡ Lightning Fast</span>
        <span class="feature">🔒 Private</span>
        <span class="feature">🎯 Explicit Control</span>
      </div>

      <div class="footer">
        <p>Created by • <a href="https://sfdcnaveen.github.io/naveen-contact-card/">Naveen</a></p>
      </div>
    </div>
  </body>
</html>
